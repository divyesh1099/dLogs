name: Release dLogs

on:
  release:
    types: [published]

jobs:
  # 1. Publish Python Package to PyPI
  pypi:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # MANDATORY for trusted publishing
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"
      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build
      - name: Build package
        run: python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  # 2. Attach Installer Scripts to Release
  release-assets:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Zip Bundle
        run: |
          zip -r dlogs-installer.zip install_dlogs.ps1 fix_windows_metrics.ps1 README.md docker-compose.yml config/ dashboards/ provisioning/
      - name: Upload Release Asset
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dlogs-installer.zip
            install_dlogs.ps1
            fix_windows_metrics.ps1

  # 3. Publish "Installer" Docker Image
  # Allows users to run: docker run -v /var/run/docker.sock:/var/run/docker.sock divyesh/dlogs-installer
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile # We will create this next
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/dlogs:latest,${{ secrets.DOCKERHUB_USERNAME }}/dlogs:${{ github.event.release.tag_name }}
