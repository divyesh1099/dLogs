name: Release dLogs (PyPI + Docker + Binaries)

on:
  release:
    types: [published]

permissions:
  contents: write
  packages: write
  id-token: write

env:
  PACKAGE_NAME: motidivya-dlogs
  IMAGE_NAME: dlogs

jobs:
  # ------------------------
  # 1) Build Python dist
  # ------------------------
  build-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip
          pip install build
          python -m build

      - name: Upload dist as artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/*

  # ------------------------
  # 2) Publish to PyPI
  # ------------------------
  publish-pypi:
    needs: build-python
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist

      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1

  # ------------------------
  # 3) Build standalone binaries
  # ------------------------
  build-binaries:
    name: Build binaries (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            out_name: dlogs-linux-amd64
          - os: windows-latest
            out_name: dlogs-windows-amd64
          - os: macos-latest
            out_name: dlogs-macos-universal2

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller .
        shell: bash

      - name: Build binary
        run: |
          pyinstaller --onefile --name dlogs dlogs/cli.py
        shell: bash

      - name: Package output (linux/mac)
        if: runner.os != 'Windows'
        run: |
          mkdir -p out
          mv dist/dlogs out/
          tar -czf ${{ matrix.out_name }}.tar.gz -C out dlogs
        shell: bash

      - name: Package output (windows)
        if: runner.os == 'Windows'
        run: |
          mkdir out
          move dist\dlogs.exe out\dlogs.exe
          powershell -Command "Compress-Archive -Path out\dlogs.exe -DestinationPath ${{ matrix.out_name }}.zip"
        shell: cmd

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.out_name }}
          path: |
            *.tar.gz
            *.zip

  # ------------------------
  # 4) Build + Push Docker Image (multi-arch)
  # ------------------------
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push (amd64+arm64)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.event.release.tag_name }}

  # ------------------------
  # 5) Upload Release Assets (zip + scripts + binaries)
  # ------------------------
  release-assets:
    needs: [build-binaries]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: release_assets

      - name: Build installer bundle zip
        run: |
          zip -r release_assets/dlogs-installer.zip \
            install_dlogs.ps1 install_dlogs.sh README.md \
            dlogs/assets/docker-compose.yml \
            dlogs/assets/config \
            dlogs/assets/dashboards \
            dlogs/assets/provisioning

      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release_assets/dlogs-installer.zip
            install_dlogs.ps1
            install_dlogs.sh
            release_assets/**/*
