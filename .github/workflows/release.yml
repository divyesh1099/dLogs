name: Auto Release (Bump + Build + Publish)

on:
  push:
    branches:
      - main
    paths-ignore:
      - "README.md"
      - "docs/**"
      - "mkdocs.yml"
      - ".gitignore"

permissions:
  contents: write
  packages: write
  id-token: write

env:
  PACKAGE_NAME: motidivya-dlogs
  IMAGE_NAME: dlogs

jobs:
  # ------------------------
  # 1) Bump Version & Tag
  # ------------------------
  bump-version:
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.bump.outputs.version }}
      tag_name: ${{ steps.bump.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump Version
        id: bump
        run: |
          # Read version from pyproject.toml
          OLD_VER=$(grep -m1 'version = "' pyproject.toml | cut -d'"' -f2 | tr -d '\r')
          echo "Current Version: $OLD_VER"

          # Bump patch version (Simple Semantic Versioning)
          IFS='.' read -r -a parts <<< "$OLD_VER"
          parts[2]=$((parts[2] + 1))
          NEW_VER="${parts[0]}.${parts[1]}.${parts[2]}"
          echo "New Version: $NEW_VER"

          # Update pyproject.toml
          sed -i "s/version = \"$OLD_VER\"/version = \"$NEW_VER\"/" pyproject.toml

          # Commit and Push
          git add pyproject.toml
          git commit -m "chore: bump version to $NEW_VER [skip ci]"
          git tag "v$NEW_VER"

          git push origin main
          git push origin "v$NEW_VER"

          # Output for other jobs
          echo "version=$NEW_VER" >> $GITHUB_OUTPUT
          echo "tag=v$NEW_VER" >> $GITHUB_OUTPUT

  # ------------------------
  # 2) Build Python dist
  # ------------------------
  build-python:
    needs: bump-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump-version.outputs.tag_name }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip
          pip install build
          python -m build

      - name: Upload dist as artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/*

  # ------------------------
  # 3) Publish to PyPI
  # ------------------------
  publish-pypi:
    needs: build-python
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment: pypi
    env:
      PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist

      - name: Publish to PyPI (Trusted Publishing)
        if: env.PYPI_API_TOKEN == ''
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

      - name: Publish to PyPI (API token)
        if: env.PYPI_API_TOKEN != ''
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true

  # ------------------------
  # 4) Build standalone binaries
  # ------------------------
  build-binaries:
    needs: bump-version
    name: Build binaries (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            out_name: dlogs-linux-amd64
          - os: windows-latest
            out_name: dlogs-windows-amd64
          - os: macos-latest
            out_name: dlogs-macos-universal2

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump-version.outputs.tag_name }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller .
        shell: bash

      - name: Build binary
        run: |
          pyinstaller --onefile --name dlogs dlogs/cli.py
        shell: bash

      - name: Package output (linux/mac)
        if: runner.os != 'Windows'
        run: |
          mkdir -p out
          mv dist/dlogs out/
          tar -czf ${{ matrix.out_name }}.tar.gz -C out dlogs
        shell: bash

      - name: Package output (windows)
        if: runner.os == 'Windows'
        run: |
          mkdir out
          move dist\dlogs.exe out\dlogs.exe
          powershell -Command "Compress-Archive -Path out\dlogs.exe -DestinationPath ${{ matrix.out_name }}.zip"
        shell: cmd

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.out_name }}
          path: |
            *.tar.gz
            *.zip

  # ------------------------
  # 5) Build + Push Docker Image (multi-arch)
  # ------------------------
  docker:
    needs: bump-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump-version.outputs.tag_name }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push (amd64+arm64)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ needs.bump-version.outputs.tag_name }}

  # ------------------------
  # 6) Create GitHub Release & Upload Assets
  # ------------------------
  release-assets:
    needs: [bump-version, build-binaries]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump-version.outputs.tag_name }}

      - name: Download binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: release_assets

      - name: Build installer bundle zip
        run: |
          zip -r release_assets/dlogs-installer.zip \
            install_dlogs.ps1 install_dlogs.sh README.md \
            dlogs/assets/docker-compose.yml \
            dlogs/assets/config \
            dlogs/assets/dashboards \
            dlogs/assets/provisioning

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ needs.bump-version.outputs.tag_name }}
          name: Release ${{ needs.bump-version.outputs.tag_name }}
          draft: false
          prerelease: false
          allowUpdates: true
          replacesArtifacts: true
          artifacts: |
            install_dlogs.ps1
            install_dlogs.sh
            release_assets/dlogs-installer.zip
            release_assets/*/*.whl
            release_assets/*/*.tar.gz
            release_assets/*/*.zip
